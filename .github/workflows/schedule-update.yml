name: schedule-update-and-notify

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天早上 8:30 (UTC时间 0:30)
    - cron: "30 0 * * *"

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    
    # 授予工作流对仓库内容的写入权限，以允许 git push
    permissions:
      contents: write

    env:
      TZ: Asia/Shanghai

    steps:
      # 步骤 1: 克隆仓库
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          # 必须获取完整的提交历史，才能在后续步骤中读取上一个commit的文件
          fetch-depth: 0

      # 步骤 2: 配置Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      # 步骤 3: 安装Python依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 步骤 4: 配置Git用户信息
      - name: Config git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase

      # 步骤 5: 运行Python脚本以生成或更新独立的JSON文件
      - name: Run python script
        run: python -u main.py
        env:
          ENABLE_DEBUG_PRINT: true
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}

      # 步骤 6: 检查是否有文件变动，并设置一个输出变量
      - name: Check for file changes
        id: git-check
        run: |
          if ! git diff-index --quiet HEAD; then
            echo "Changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      # 步骤 7: 提交并推送变更
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "update by github action"
          git push -u origin main

      # 步骤 8: ✨ 从独立的JSON文件构建并发送美化后的飞书通知 ✨
      # 注释：无论是否有代码更新都发送webhook消息，确保定时通知正常运行
      - name: Build and Send Notifications from JSON Files
        # if: steps.git-check.outputs.has_changes == 'true'  # 已注释：移除条件限制，每次执行都发送通知
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          # FEISHU_WEBHOOK_URL_TEST: ${{ secrets.FEISHU_WEBHOOK_URL_TEST }}
          FEISHU_WEBHOOK_URL_CHANYAN: ${{ secrets.FEISHU_WEBHOOK_URL_CHANYAN }}
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: |
          # 1. 定义一个函数，用于将 JSON 数组安全地转换为带序号的 Markdown 列表
          json_to_markdown_list() {
              # 使用 jq:
              # -s (--slurp) 读取所有输入形成一个数组
              # -r (--raw-output) 输出原始文本，而不是带引号的JSON字符串
              # [0] | if . then ... else "" end: 安全地处理空输入
              # to_entries | .[]: 将数组转换为 [key, value] 对象并遍历
              # "\(.key + 1). [\(.value.title)](\(.value.url))": 格式化为 Markdown
              jq -sr '[.[] | to_entries | .[] | "\(.key + 1). [\(.value.title)](\(.value.url))"] | join("\n")'
          }

          # 2. 从工作区中直接读取当天的 JSON 文件内容（而不是从git HEAD读取）
          #    "2>/dev/null || echo '[]'" 是一个安全措施，如果文件不存在（例如脚本失败），则返回一个空的JSON数组
          CURRENT_DATE=$(date +%Y-%m-%d)
          KR_JSON=$(cat ./raw/36kr/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          JUEJIN_JSON=$(cat ./raw/juejin/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          GITHUB_JSON=$(cat ./raw/github/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          WEREAD_JSON=$(cat ./raw/weread/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          PREV_KR_JSON=$(git show HEAD~1:./raw/36kr/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          PREV_JUEJIN_JSON=$(git show HEAD~1:./raw/juejin/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          PREV_GITHUB_JSON=$(git show HEAD~1:./raw/github/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          PREV_WEREAD_JSON=$(git show HEAD~1:./raw/weread/$CURRENT_DATE.json 2>/dev/null || echo "[]")
          KR_NEW=$(echo "$KR_JSON" | jq --argjson prev "$PREV_KR_JSON" '[.[] | select(.url as $u | ($prev | map(.url) | index($u) | not))]')
          JUEJIN_NEW=$(echo "$JUEJIN_JSON" | jq --argjson prev "$PREV_JUEJIN_JSON" '[.[] | select(.url as $u | ($prev | map(.url) | index($u) | not))]')
          GITHUB_NEW=$(echo "$GITHUB_JSON" | jq --argjson prev "$PREV_GITHUB_JSON" '[.[] | select(.url as $u | ($prev | map(.url) | index($u) | not))]')
          WEREAD_NEW=$(echo "$WEREAD_JSON" | jq --argjson prev "$PREV_WEREAD_JSON" '[.[] | select(.url as $u | ($prev | map(.url) | index($u) | not))]')
          UPDATE_TIME=$(date '+%Y年%m月%d日 %H:%M')

          # 2.5 AI/AIGC 关键词过滤：只保留与 AI、大模型、AIGC 相关的条目
          AI_PATTERN="AI|AIGC|AGI|GPT|LLM|大模型|人工智能|ChatGPT|Claude|Gemini|机器学习|深度学习|神经网络|Sora|生成式|生成AI|智能体|Agent|OpenAI|Anthropic|文心|通义|混元|Kimi|豆包|Cursor|Copilot|多模态|Transformer|扩散模型|向量|微调|预训练|算力|推理|算法|DeepSeek|Llama|Mistral|Stable Diffusion|Midjourney"
          KR_NEW=$(echo "$KR_NEW" | jq --arg pat "$AI_PATTERN" '[.[] | select(.title | test($pat; "i"))]')
          JUEJIN_NEW=$(echo "$JUEJIN_NEW" | jq --arg pat "$AI_PATTERN" '[.[] | select(.title | test($pat; "i"))]')
          # GitHub 同时检查 title 和 description 字段
          GITHUB_NEW=$(echo "$GITHUB_NEW" | jq --arg pat "$AI_PATTERN" '[.[] | select((.title + " " + (.description // "")) | test($pat; "i"))]')
          # 微信读书也过滤（书名含 AI 相关词）
          WEREAD_NEW=$(echo "$WEREAD_NEW" | jq --arg pat "$AI_PATTERN" '[.[] | select(.title | test($pat; "i"))]')

          # 3. 将每个平台的 JSON 转换为格式正确的 Markdown 列表
          KR_MD=$(echo "$KR_NEW" | json_to_markdown_list)
          JUEJIN_MD=$(echo "$JUEJIN_NEW" | json_to_markdown_list)
          GITHUB_MD=$(echo "$GITHUB_NEW" | json_to_markdown_list)
          WEREAD_MD=$(echo "$WEREAD_NEW" | json_to_markdown_list)

          if [ -z "$KR_MD$JUEJIN_MD$GITHUB_MD$WEREAD_MD" ]; then
            echo "No AI/AIGC incremental updates today. Skipping Feishu notification."
            exit 0
          fi
          
          # 4. 在 Shell 中逐步、安全地构建 "elements" JSON 数组
          ELEMENTS_JSON="[$(jq -n --arg time "$UPDATE_TIME" '{"tag": "div", "text": {"tag": "lark_md", "content": ("**更新时间:** " + $time + "　　🔍 仅展示 AI / AIGC 相关内容")}}')]"

          # 添加署名信息
          SIGNATURE=$(jq -n '{"tag": "div", "text": {"tag": "lark_md", "content": "*Created by Julie*"}}')
          ELEMENTS_JSON=$(echo "$ELEMENTS_JSON" | jq --argjson signature "$SIGNATURE" '. + [$signature]')

          if [ -n "$KR_MD" ]; then
            SECTION=$(jq -n --arg content "$KR_MD" '[{"tag": "hr"}, {"tag": "div", "text": {"tag": "lark_md", "content": "**36氪 | 热榜**"}}, {"tag": "div", "text": {"tag": "lark_md", "content": $content}}]')
            ELEMENTS_JSON=$(echo "$ELEMENTS_JSON" | jq --argjson section "$SECTION" '. + $section')
          fi

          if [ -n "$JUEJIN_MD" ]; then
            SECTION=$(jq -n --arg content "$JUEJIN_MD" '[{"tag": "hr"}, {"tag": "div", "text": {"tag": "lark_md", "content": "**掘金 | 热榜**"}}, {"tag": "div", "text": {"tag": "lark_md", "content": $content}}]')
            ELEMENTS_JSON=$(echo "$ELEMENTS_JSON" | jq --argjson section "$SECTION" '. + $section')
          fi

          if [ -n "$GITHUB_MD" ]; then
            SECTION=$(jq -n --arg content "$GITHUB_MD" '[{"tag": "hr"}, {"tag": "div", "text": {"tag": "lark_md", "content": "**GitHub | Trending**"}}, {"tag": "div", "text": {"tag": "lark_md", "content": $content}}]')
            ELEMENTS_JSON=$(echo "$ELEMENTS_JSON" | jq --argjson section "$SECTION" '. + $section')
          fi

          if [ -n "$WEREAD_MD" ]; then
            SECTION=$(jq -n --arg content "$WEREAD_MD" '[{"tag": "hr"}, {"tag": "div", "text": {"tag": "lark_md", "content": "**微信读书 | 热榜**"}}, {"tag": "div", "text": {"tag": "lark_md", "content": $content}}]')
            ELEMENTS_JSON=$(echo "$ELEMENTS_JSON" | jq --argjson section "$SECTION" '. + $section')
          fi

          BUTTONS_JSON='[{"tag": "hr"}, {"tag": "action", "actions": [{"tag": "button", "text": {"tag": "plain_text", "content": "前往 36氪"}, "type": "primary", "url": "https://36kr.com/"}, {"tag": "button", "text": {"tag": "plain_text", "content": "前往 掘金"}, "type": "primary", "url": "https://juejin.cn/hot"}, {"tag": "button", "text": {"tag": "plain_text", "content": "前往 GitHub"}, "type": "primary", "url": "https://github.com/trending"}, {"tag": "button", "text": {"tag": "plain_text", "content": "前往 微信读书"}, "type": "primary", "url": "https://weread.qq.com/"}]}]'
          ELEMENTS_JSON=$(echo "$ELEMENTS_JSON" | jq --argjson buttons "$BUTTONS_JSON" '. + $buttons')

          # 5. 使用最终的模板，将构建好的 elements 数组安全地注入
          JSON_PAYLOAD=$(jq -n --argjson elements "$ELEMENTS_JSON" \
          '{
            "msg_type": "interactive",
            "card": {
              "config": { "wide_screen_mode": true },
              "header": { "title": { "tag": "plain_text", "content": "📰 每日热榜简报" }, "template": "blue" },
              "elements": $elements
            }
          }')

          # 6. 循环遍历所有 webhook URL 并发送通知
          # for url in "$FEISHU_WEBHOOK_URL" "$FEISHU_WEBHOOK_URL_TEST" "$FEISHU_WEBHOOK_URL_CHANYAN"; do
          for url in "$FEISHU_WEBHOOK_URL" "$FEISHU_WEBHOOK_URL_CHANYAN"; do
            if [ -n "$url" ]; then
              echo "Sending notification to a webhook..."
              curl -X POST -H "Content-Type: application/json" -d "$JSON_PAYLOAD" "$url"
            else
              echo "Skipping an empty webhook URL."
            fi
          done
